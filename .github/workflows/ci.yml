name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Validate interface metadata
        run: |
          python -c "
          from finance_data.provider.metadata.validator import Validator, run_validation_report
          import finance_data.mcp.server as server
          v = Validator(server)
          results = v.validate_all()
          failures = [r for r in results if not r.passed]
          if failures:
              print(run_validation_report())
              raise SystemExit(1)
          print('接口校验通过，0 failures')
          "
